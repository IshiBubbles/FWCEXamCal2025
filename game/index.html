<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highway Game</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:Arial,sans-serif; }

    #gc {
      position:relative;
      width:100vw; height:100vh;
      overflow:hidden;
    }

    #sky {
      position:absolute; top:0; left:0; width:100%; height:20%;
      background:linear-gradient(to bottom,#050d18,#0d2540,#1a4a7a);
    }
    #verge-top  { position:absolute; top:20%; left:0; width:100%; height:8%;  background:#2e5022; }
    #verge-bot  { position:absolute; top:84%; left:0; width:100%; height:16%; background:#2e5022; }

    #road {
      position:absolute; top:28%; left:0; width:100%; height:56%;
      background:#1e1e1e;
    }
    #road::before { content:''; position:absolute; top:0;    left:0; width:100%; height:7px; background:#e8c840; }
    #road::after  { content:''; position:absolute; bottom:0; left:0; width:100%; height:7px; background:#e8c840; }

    .lane-div {
      position:absolute; left:0; width:200%; height:8px;
      display:flex;
      animation:scroll-road 1.4s linear infinite;
    }
    .lane-div.solid  .ld { width:100%;  height:8px; background:#fff; }
    .lane-div.dashed .ld { width:100px; height:8px; background:#fff; margin-right:80px; flex-shrink:0; border-radius:3px; }
    @keyframes scroll-road { from{transform:translateX(0)} to{transform:translateX(-180px)} }

    .tree-row {
      position:absolute; left:0; width:200%;
      display:flex; align-items:flex-end; gap:120px;
      animation:scroll-trees 4s linear infinite;
    }
    @keyframes scroll-trees { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    #trees-top { bottom:72%; }
    #trees-bot { top:84.5%; }
    .tree { flex-shrink:0; display:flex; flex-direction:column; align-items:center; }
    .tree-top { width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-bottom:52px solid #2a6628; }
    .tree-mid { width:0;height:0;border-left:30px solid transparent;border-right:30px solid transparent;border-bottom:42px solid #337730;margin-top:-20px; }
    .tree-trunk { width:12px;height:20px;background:#6b4226; }

    /* ── Vehicles ── */
    .veh {
      position:absolute;
      z-index:20;
      border-radius:5px;
      pointer-events:none;
    }
    .veh-label {
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      font-size:11px; font-weight:bold; color:#000; opacity:0.5;
      pointer-events:none;
    }

    /* ── Frog ── */
    #frog {
      position:absolute; z-index:30;
      width:52px; height:44px;
      transform:translate(-50%,-50%);
    }
    .fbody {
      position:absolute;
      width:38px; height:30px;
      background:#cc2200;
      border-radius:50% 50% 45% 45%;
      top:10px; left:7px;
      box-shadow:inset 0 -4px 6px rgba(0,0,0,0.3);
    }
    .fbelly {
      position:absolute;
      width:24px; height:18px;
      background:#ff7755; border-radius:50%;
      top:16px; left:14px;
    }
    .feye {
      position:absolute;
      width:14px; height:14px;
      background:#cc2200; border-radius:50%; top:2px;
    }
    .feye.L { left:6px; } .feye.R { right:6px; }
    .feye::after {
      content:''; position:absolute;
      width:8px; height:8px; background:#111; border-radius:50%;
      top:3px; left:3px; box-shadow:2px 1px 0 1px #fff;
    }
    .fleg { position:absolute; background:#cc2200; border-radius:0 0 5px 5px; }
    .fleg.fl { width:10px;height:16px; top:26px; left:0;   transform:rotate(-20deg); }
    .fleg.fr { width:10px;height:16px; top:26px; right:0;  transform:rotate(20deg); }
    .fleg.bl { width:14px;height:12px; top:36px; left:2px; transform:rotate(-30deg); border-radius:0 0 8px 8px; }
    .fleg.br { width:14px;height:12px; top:36px; right:2px;transform:rotate(30deg);  border-radius:0 0 8px 8px; }

    @keyframes hop {
      0%  {transform:translate(-50%,-50%) scale(1,1)}
      35% {transform:translate(-50%,-50%) scale(.82,1.22)}
      65% {transform:translate(-50%,-50%) scale(1.12,.88)}
      100%{transform:translate(-50%,-50%) scale(1,1)}
    }
    #frog.hopping { animation:hop .18s ease-out forwards; }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:.15} }
    #frog.inv { animation:blink .3s linear infinite; }

    /* ── Splat ── */
    .splat {
      position:absolute; z-index:35;
      transform:translate(-50%,-50%);
      pointer-events:none;
      animation:splatPop .25s ease-out forwards;
    }
    .sblob { position:absolute; background:#cc2200; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); }
    .sx { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:22px; color:#ff0; font-weight:900; }
    @keyframes splatPop {
      from{opacity:0;transform:translate(-50%,-50%) scale(.2)}
      40% {opacity:1;transform:translate(-50%,-50%) scale(1.2)}
      100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    }

    /* ── HUD ── */
    #hud {
      position:absolute; top:14px; right:18px;
      z-index:40; display:flex; gap:6px;
    }
    .licon { font-size:30px; filter:drop-shadow(0 0 4px rgba(0,0,0,.8)); transition:all .3s; }
    .licon.lost { filter:grayscale(1) brightness(.35); transform:scale(.75); }

    /* ── Game Over ── */
    #go {
      display:none; position:absolute; inset:0; z-index:50;
      background:rgba(0,0,0,.72);
      flex-direction:column; justify-content:center; align-items:center; gap:24px;
    }
    #go h1 { color:#f44; font-size:72px; font-weight:900; letter-spacing:4px; text-shadow:0 0 20px #f00,0 4px 0 #800; }
    #go p  { color:#ccc; font-size:22px; }
    #go button {
      padding:14px 48px; font-size:22px; font-weight:bold;
      background:#cc2200; color:#fff; border:none; border-radius:8px;
      cursor:pointer; box-shadow:0 4px 0 #801000;
    }
  </style>
</head>
<body>
<div id="gc">
  <div id="sky"></div>
  <div id="verge-top"></div>
  <div id="road"></div>
  <div id="verge-bot"></div>
  <div class="tree-row" id="trees-top"></div>
  <div class="tree-row" id="trees-bot"></div>

  <div id="frog">
    <div class="feye L"></div><div class="feye R"></div>
    <div class="fbody"><div class="fbelly"></div></div>
    <div class="fleg fl"></div><div class="fleg fr"></div>
    <div class="fleg bl"></div><div class="fleg br"></div>
  </div>

  <div id="hud">
    <span class="licon" id="l2">🐸</span>
    <span class="licon" id="l1">🐸</span>
    <span class="licon" id="l0">🐸</span>
  </div>

  <div id="go">
    <h1>GAME OVER</h1>
    <p>Your frog got splattered 3 times!</p>
    <button onclick="restart()">Try Again</button>
  </div>
</div>

<script>
// ── Road markings ──────────────────────────────────
const road = document.getElementById('road');
[{p:25,t:'dashed'},{p:50,t:'solid'},{p:75,t:'dashed'}].forEach(({p,t}) => {
  const mk = top => {
    const d = document.createElement('div');
    d.className = 'lane-div ' + t;
    d.style.top = top;
    const n = t==='dashed' ? 28 : 1;
    for (let i=0;i<n;i++){const s=document.createElement('div');s.className='ld';d.appendChild(s);}
    road.appendChild(d);
  };
  mk(`calc(${p}% - 4px)`);
  if (t==='solid') mk(`calc(${p}% + 6px)`);
});

// ── Trees ─────────────────────────────────────────
function buildTrees(id, n, sc) {
  const row = document.getElementById(id);
  for (let i=0;i<n;i++){
    const t=document.createElement('div'); t.className='tree';
    t.style.transform=`scale(${sc*(0.7+Math.random()*0.6)})`;
    t.style.transformOrigin='bottom center';
    t.innerHTML='<div class="tree-top"></div><div class="tree-mid"></div><div class="tree-trunk"></div>';
    row.appendChild(t);
  }
}
buildTrees('trees-top',22,1);
buildTrees('trees-bot',22,1.2);

// ── Geometry ──────────────────────────────────────
const gc = document.getElementById('gc');
function roadBounds(){
  return { top: innerHeight*0.28+7, bot: innerHeight*0.84-7, W: innerWidth };
}
function laneY(lane) {
  const {top,bot} = roadBounds();
  const lh = (bot-top)/4;
  return top + lh*lane + lh/2;
}

// ── Vehicle types ──────────────────────────────────
const TYPES = {
  car:   { w:88,  h:32, speedMin:2.5, speedMax:5.5  },
  truck: { w:160, h:44, speedMin:1.5, speedMax:3.0  },
  moto:  { w:50,  h:24, speedMin:4.5, speedMax:8.5  },
};
const VCOLS = ['#e74c3c','#3498db','#f39c12','#9b59b6','#1abc9c','#e67e22','#2ecc71','#fff','#e84393'];

function pickType(){ const r=Math.random(); return r<.55?'car':r<.78?'truck':'moto'; }

// ── Make a vehicle element (simple solid rect, NO children, NO position override) ──
function makeVeh(type) {
  const def = TYPES[type];
  const col = VCOLS[Math.floor(Math.random()*VCOLS.length)];
  const el  = document.createElement('div');
  el.className = 'veh';  // position:absolute comes from CSS class only
  el.style.width  = def.w + 'px';
  el.style.height = def.h + 'px';
  el.style.background = col;
  el.style.boxShadow  = '0 3px 8px rgba(0,0,0,0.6)';
  // tiny label so we can see type
  const lbl = document.createElement('span');
  lbl.className = 'veh-label';
  lbl.textContent = type;
  el.appendChild(lbl);
  return el;
}

// ── Vehicles array ─────────────────────────────────
let vehicles = [];

function addVeh(lane, startX) {
  const type  = pickType();
  const def   = TYPES[type];
  const speed = def.speedMin + Math.random()*(def.speedMax-def.speedMin);
  if (startX === undefined) startX = innerWidth + def.w + 20;
  const el = makeVeh(type);
  const topY = laneY(lane) - def.h/2;
  el.style.left = startX + 'px';
  el.style.top  = topY    + 'px';
  gc.appendChild(el);
  vehicles.push({ el, lane, speed, x:startX, w:def.w, h:def.h, topY });
}

function spawn() {
  // try lanes in shuffled order, skip if crowded at right edge
  const lanes = [0,1,2,3].sort(()=>Math.random()-.5);
  for (const lane of lanes) {
    if (!vehicles.some(v => v.lane===lane && v.x > innerWidth-180)) {
      addVeh(lane);
      return;
    }
  }
}

function seedTraffic() {
  // place vehicles at various x positions — some on-screen, some approaching
  const W = innerWidth;
  [ [0, W*0.1], [2, W*0.35], [1, W*0.6], [3, W*0.82],
    [0, W*1.1], [2, W*1.4],  [1, W*1.7], [3, W*2.0] ]
    .forEach(([lane,x]) => addVeh(lane, x));
}

function moveVehicles() {
  for (let i=vehicles.length-1; i>=0; i--) {
    const v = vehicles[i];
    v.x -= v.speed;
    v.el.style.left = v.x + 'px';
    if (v.x + v.w < 0) { v.el.remove(); vehicles.splice(i,1); }
  }
}

// ── Spawn timer ────────────────────────────────────
function schedSpawn() {
  if (document.getElementById('go').style.display !== 'flex') spawn();
  setTimeout(schedSpawn, 700 + Math.random()*1100);
}

// ── Collision ──────────────────────────────────────
let isDead=false, isInv=false;
function checkHit() {
  if (isDead||isInv) return;
  const fL=frogX-13, fT=frogY-9, fW=26, fH=22;
  for (const v of vehicles) {
    if (fL < v.x+v.w-4 && fL+fW > v.x+4 && fT < v.topY+v.h-4 && fT+fH > v.topY+4) {
      smash(); return;
    }
  }
}

// ── Splat & lives ──────────────────────────────────
let lives = 3;
function hudUpdate() {
  for (let i=0;i<3;i++) document.getElementById('l'+i).classList.toggle('lost',i>=lives);
}

function splat(x,y) {
  const s=document.createElement('div'); s.className='splat';
  s.style.left=x+'px'; s.style.top=y+'px';
  [{w:54,h:40,ox:0,oy:0},{w:18,h:14,ox:-30,oy:-10},{w:14,h:12,ox:32,oy:-12},
   {w:16,h:12,ox:6,oy:-28},{w:12,h:16,ox:-16,oy:24},{w:10,h:8,ox:26,oy:20}]
  .forEach(({w,h,ox,oy}) => {
    const b=document.createElement('div'); b.className='sblob';
    b.style.width=w+'px'; b.style.height=h+'px';
    b.style.marginLeft=(ox-w/2)+'px'; b.style.marginTop=(oy-h/2)+'px';
    s.appendChild(b);
  });
  const x2=document.createElement('div'); x2.className='sx'; x2.textContent='✕';
  s.appendChild(x2); gc.appendChild(s); return s;
}

function smash() {
  isDead=true;
  document.getElementById('frog').style.display='none';
  const s = splat(frogX,frogY);
  lives--; hudUpdate();
  setTimeout(()=>{
    s.remove();
    if (lives<=0) { document.getElementById('go').style.display='flex'; }
    else { respawn(); }
  }, 1400);
}

function respawn() {
  isDead=false; isInv=true;
  const f=document.getElementById('frog');
  f.style.display=''; f.classList.add('inv');
  frogReset();
  setTimeout(()=>{ isInv=false; f.classList.remove('inv'); }, 2000);
}

// ── Frog ──────────────────────────────────────────
let frogX, frogY, frogDir=1;
const keys={};
const fEl = document.getElementById('frog');

function frogReset() {
  const {top,bot,W} = roadBounds();
  frogX=W/2; frogY=(top+bot)/2;
  fEl.style.left=frogX+'px'; fEl.style.top=frogY+'px';
  fEl.style.transform='translate(-50%,-50%)';
  frogDir=1;
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

let moving=false, hopTmr=null;
function hop() {
  fEl.classList.remove('hopping'); void fEl.offsetWidth;
  fEl.classList.add('hopping');
  clearTimeout(hopTmr);
  hopTmr=setTimeout(()=>fEl.classList.remove('hopping'),200);
}

// ── Restart ───────────────────────────────────────
function restart() {
  vehicles.forEach(v=>v.el.remove()); vehicles=[];
  lives=3; isDead=false; isInv=false; hudUpdate();
  document.getElementById('go').style.display='none';
  fEl.style.display=''; fEl.classList.remove('inv');
  frogReset(); seedTraffic();
}

// ── Game loop ─────────────────────────────────────
const SPEED=4;
function loop() {
  const go = document.getElementById('go');
  if (go.style.display!=='flex') {
    if (!isDead) {
      const {top,bot,W}=roadBounds();
      let dx=0,dy=0;
      if(keys.ArrowLeft)  dx-=SPEED;
      if(keys.ArrowRight) dx+=SPEED;
      if(keys.ArrowUp)    dy-=SPEED;
      if(keys.ArrowDown)  dy+=SPEED;
      if(dx||dy){
        frogX = Math.min(W-26,  Math.max(26,      frogX+dx));
        frogY = Math.min(bot-22, Math.max(top+22, frogY+dy));
        if(dx>0) frogDir=1; else if(dx<0) frogDir=-1;
        fEl.style.left = frogX+'px';
        fEl.style.top  = frogY+'px';
        fEl.style.transform = `translate(-50%,-50%) scaleX(${frogDir})`;
        if(!moving){hop();moving=true;}
      } else moving=false;
    }
    moveVehicles();
    checkHit();
  }
  requestAnimationFrame(loop);
}

// ── Boot ──────────────────────────────────────────
frogReset();
hudUpdate();
seedTraffic();
setTimeout(schedSpawn, 1500);
loop();
</script>
</body>
</html>
