<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highway Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }

    #game-container {
      position: relative;
      width: 100vw; height: 100vh;
      overflow: hidden;
    }

    /* Sky */
    #sky {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 20%;
      background: linear-gradient(to bottom, #050d18, #0d2540, #1a4a7a);
    }

    /* Verges */
    #verge-top {
      position: absolute; top: 20%; left: 0;
      width: 100%; height: 8%;
      background: #2e5022;
    }
    #verge-bottom {
      position: absolute; top: 84%; left: 0;
      width: 100%; height: 16%;
      background: #2e5022;
    }

    /* Road */
    #road {
      position: absolute; top: 28%; left: 0;
      width: 100%; height: 56%;
      background: #1e1e1e;
    }
    #road::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 100%; height: 7px; background: #e8c840;
    }
    #road::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 100%; height: 7px; background: #e8c840;
    }

    /* Lane dividers */
    .lane-divider {
      position: absolute; left: 0;
      width: 200%; height: 8px;
      display: flex;
      animation: scroll-road 1.4s linear infinite;
    }
    .lane-divider.solid .lane-dash { width: 100%; height: 8px; background: #fff; }
    .lane-divider.dashed .lane-dash {
      width: 100px; height: 8px; background: #fff;
      margin-right: 80px; flex-shrink: 0; border-radius: 3px;
    }
    @keyframes scroll-road {
      from { transform: translateX(0); }
      to   { transform: translateX(-180px); }
    }

    /* Trees */
    .tree-row {
      position: absolute; left: 0; width: 200%;
      display: flex; align-items: flex-end; gap: 120px;
      animation: scroll-scenery 4s linear infinite;
    }
    @keyframes scroll-scenery {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    #trees-top    { bottom: 72%; }
    #trees-bottom { top: 84.5%; }
    .tree { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
    .tree-top { width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-bottom:52px solid #2a6628; }
    .tree-mid { width:0;height:0;border-left:30px solid transparent;border-right:30px solid transparent;border-bottom:42px solid #337730;margin-top:-20px; }
    .tree-trunk { width:12px;height:20px;background:#6b4226; }

    /* Road texture */
    #road-texture {
      position: absolute; top: 28%; left: 0;
      width: 200%; height: 56%;
      background-image: repeating-linear-gradient(
        90deg, transparent 0px, transparent 3px,
        rgba(255,255,255,0.015) 3px, rgba(255,255,255,0.015) 4px
      );
      animation: scroll-texture 0.08s linear infinite;
      pointer-events: none;
    }
    @keyframes scroll-texture {
      from { transform: translateX(0); }
      to   { transform: translateX(-4px); }
    }

    /* Vehicles */
    .vehicle {
      position: absolute;
      z-index: 20;
      pointer-events: none;
    }

    /* Frog */
    #frog {
      position: absolute;
      width: 52px; height: 44px;
      z-index: 30;
      transform: translate(-50%, -50%);
    }
    #frog .body {
      position: absolute;
      width: 38px; height: 30px;
      background: #3cb043;
      border-radius: 50% 50% 45% 45%;
      top: 10px; left: 7px;
      box-shadow: inset 0 -4px 6px rgba(0,0,0,0.3);
    }
    #frog .belly {
      position: absolute;
      width: 24px; height: 18px;
      background: #a8e063; border-radius: 50%;
      top: 16px; left: 14px;
    }
    #frog .eye {
      position: absolute;
      width: 14px; height: 14px;
      background: #3cb043; border-radius: 50%; top: 2px;
    }
    #frog .eye.left  { left: 6px; }
    #frog .eye.right { right: 6px; }
    #frog .eye::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      background: #111; border-radius: 50%;
      top: 3px; left: 3px;
      box-shadow: 2px 1px 0 1px #fff;
    }
    #frog .leg-fl { position:absolute;width:10px;height:16px;background:#3cb043;border-radius:0 0 5px 5px;top:26px;left:0;transform:rotate(-20deg); }
    #frog .leg-fr { position:absolute;width:10px;height:16px;background:#3cb043;border-radius:0 0 5px 5px;top:26px;right:0;transform:rotate(20deg); }
    #frog .leg-bl { position:absolute;width:14px;height:12px;background:#3cb043;border-radius:0 0 8px 8px;top:36px;left:2px;transform:rotate(-30deg); }
    #frog .leg-br { position:absolute;width:14px;height:12px;background:#3cb043;border-radius:0 0 8px 8px;top:36px;right:2px;transform:rotate(30deg); }

    @keyframes hop {
      0%   { transform: translate(-50%,-50%) scale(1,1); }
      35%  { transform: translate(-50%,-50%) scale(0.82,1.22); }
      65%  { transform: translate(-50%,-50%) scale(1.12,0.88); }
      100% { transform: translate(-50%,-50%) scale(1,1); }
    }
    #frog.hopping { animation: hop 0.18s ease-out forwards; }

    @keyframes blink { 0%,49%{opacity:1}50%,100%{opacity:0.15} }
    #frog.invincible { animation: blink 0.3s linear infinite; }

    /* Splat */
    .splat {
      position: absolute; z-index: 35;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .splat-blob {
      position: absolute;
      background: #3cb043; border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .splat-x {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px; color: #ff2222;
      font-weight: 900; text-shadow: 0 0 4px #000;
    }
    @keyframes splatPop {
      from { opacity:0; transform:translate(-50%,-50%) scale(0.2); }
      40%  { opacity:1; transform:translate(-50%,-50%) scale(1.2); }
      100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
    }
    .splat { animation: splatPop 0.25s ease-out forwards; }

    /* Lives HUD */
    #lives-hud {
      position: absolute; top: 14px; right: 18px;
      z-index: 40; display: flex; gap: 6px; align-items: center;
    }
    .life-icon {
      font-size: 30px;
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.8));
      transition: all 0.3s;
    }
    .life-icon.lost { filter: grayscale(1) brightness(0.4); transform: scale(0.75); }

    /* Game Over */
    #gameover {
      display: none;
      position: absolute; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.72);
      flex-direction: column; justify-content: center; align-items: center; gap: 24px;
    }
    #gameover h1 { color:#ff4444;font-size:72px;font-weight:900;letter-spacing:4px;text-shadow:0 0 20px #f00,0 4px 0 #800; }
    #gameover p  { color:#ccc;font-size:22px; }
    #gameover button {
      padding:14px 48px;font-size:22px;font-weight:bold;
      background:#3cb043;color:#fff;border:none;border-radius:8px;
      cursor:pointer;letter-spacing:1px;box-shadow:0 4px 0 #1e6b22;
    }
    #gameover button:active { transform: translateY(2px); }
  </style>
</head>
<body>
<div id="game-container">
  <div id="sky"></div>
  <div id="verge-top"></div>
  <div id="road-texture"></div>
  <div id="road"></div>
  <div id="verge-bottom"></div>
  <div class="tree-row" id="trees-top"></div>
  <div class="tree-row" id="trees-bottom"></div>

  <div id="frog">
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="body"><div class="belly"></div></div>
    <div class="leg-fl"></div><div class="leg-fr"></div>
    <div class="leg-bl"></div><div class="leg-br"></div>
  </div>

  <div id="lives-hud">
    <span class="life-icon" id="life-2">🐸</span>
    <span class="life-icon" id="life-1">🐸</span>
    <span class="life-icon" id="life-0">🐸</span>
  </div>

  <div id="gameover">
    <h1>GAME OVER</h1>
    <p>Your frog got splattered 3 times!</p>
    <button onclick="restartGame()">Try Again</button>
  </div>
</div>

<script>
/* ── Road markings ── */
const road = document.getElementById('road');
[{pct:25,type:'dashed'},{pct:50,type:'solid'},{pct:75,type:'dashed'}].forEach(({pct,type}) => {
  const mk = top => {
    const d = document.createElement('div');
    d.className = 'lane-divider ' + type;
    d.style.top = top;
    if (type === 'dashed') {
      for (let i=0;i<28;i++){const s=document.createElement('div');s.className='lane-dash';d.appendChild(s);}
    } else {
      const s = document.createElement('div'); s.className='lane-dash'; d.appendChild(s);
    }
    road.appendChild(d);
  };
  mk('calc('+pct+'% - 4px)');
  if (type==='solid') mk('calc('+pct+'% + 6px)');
});

/* ── Trees ── */
function buildTrees(id, n, scale) {
  const row = document.getElementById(id);
  for (let i=0;i<n;i++){
    const t=document.createElement('div'); t.className='tree';
    t.style.transform='scale('+(scale*(0.7+Math.random()*0.6))+')';
    t.style.transformOrigin='bottom center';
    t.innerHTML='<div class="tree-top"></div><div class="tree-mid"></div><div class="tree-trunk"></div>';
    row.appendChild(t);
  }
}
buildTrees('trees-top',22,1);
buildTrees('trees-bottom',22,1.2);

/* ── Game state ── */
const gc        = document.getElementById('game-container');
const frogEl    = document.getElementById('frog');
const gameOverEl= document.getElementById('gameover');

let lives=3, isDead=false, isInvincible=false;
let vehicles=[], frogX, frogY, frogDir=1;
const keys={};

/* ── Geometry ── */
function roadBounds(){
  const h=window.innerHeight, w=window.innerWidth;
  return { top:h*0.28+7, bottom:h*0.84-7, w };
}
function laneCenterY(lane){
  const {top,bottom}=roadBounds();
  const lh=(bottom-top)/4;
  return top+lh*lane+lh/2;
}

/* ── Vehicle definitions ── */
// w and h are the full element size (including wheels)
const VDEFS = {
  car:   { w:90,  h:44, speedMin:2.5, speedMax:5.5  },
  truck: { w:170, h:54, speedMin:1.5, speedMax:3.0  },
  moto:  { w:52,  h:36, speedMin:4.5, speedMax:8.5  },
};
const COLORS = ['#e74c3c','#3498db','#f39c12','#9b59b6','#1abc9c','#e67e22','#2ecc71','#ecf0f1','#e84393','#16a085'];

function rndCol(){ return COLORS[Math.floor(Math.random()*COLORS.length)]; }

function makeVehicleEl(type){
  const el = document.createElement('div');
  el.className = 'vehicle';
  const col = rndCol();

  if (type === 'car') {
    el.style.cssText = 'width:90px;height:44px;position:relative;';
    const body = document.createElement('div');
    body.style.cssText = 'position:absolute;left:0;top:6px;width:90px;height:28px;background:'+col+';border-radius:5px;box-shadow:2px 2px 6px rgba(0,0,0,0.5);';
    const roof = document.createElement('div');
    roof.style.cssText = 'position:absolute;left:20px;top:-16px;width:46px;height:20px;background:'+col+';border-radius:5px 5px 0 0;filter:brightness(0.8);';
    const win1 = document.createElement('div');
    win1.style.cssText = 'position:absolute;left:3px;top:3px;width:16px;height:12px;background:#b8edf5;border-radius:2px;opacity:0.9;';
    const win2 = document.createElement('div');
    win2.style.cssText = 'position:absolute;right:3px;top:3px;width:16px;height:12px;background:#b8edf5;border-radius:2px;opacity:0.9;';
    roof.appendChild(win1); roof.appendChild(win2);
    const hlight = document.createElement('div');
    hlight.style.cssText = 'position:absolute;left:1px;top:10px;width:8px;height:7px;background:#fff8a0;border-radius:1px;';
    const tlight = document.createElement('div');
    tlight.style.cssText = 'position:absolute;right:1px;top:10px;width:8px;height:7px;background:#ff4444;border-radius:1px;';
    body.appendChild(roof); body.appendChild(hlight); body.appendChild(tlight);
    const wl = document.createElement('div');
    wl.style.cssText = 'position:absolute;left:8px;top:28px;width:18px;height:18px;background:#111;border-radius:50%;box-shadow:inset 0 0 0 4px #555;';
    const wr = document.createElement('div');
    wr.style.cssText = 'position:absolute;right:8px;top:28px;width:18px;height:18px;background:#111;border-radius:50%;box-shadow:inset 0 0 0 4px #555;';
    el.appendChild(body); el.appendChild(wl); el.appendChild(wr);

  } else if (type === 'truck') {
    el.style.cssText = 'width:170px;height:54px;position:relative;';
    const trailer = document.createElement('div');
    trailer.style.cssText = 'position:absolute;left:44px;top:4px;width:126px;height:38px;background:'+col+';border-radius:4px;box-shadow:2px 2px 6px rgba(0,0,0,0.5);';
    const stripe = document.createElement('div');
    stripe.style.cssText = 'position:absolute;top:0;left:0;right:0;height:7px;background:rgba(255,255,255,0.12);border-radius:4px 4px 0 0;';
    const tlight = document.createElement('div');
    tlight.style.cssText = 'position:absolute;right:2px;top:14px;width:9px;height:7px;background:#ff4444;border-radius:1px;';
    trailer.appendChild(stripe); trailer.appendChild(tlight);
    const cab = document.createElement('div');
    cab.style.cssText = 'position:absolute;left:0;top:2px;width:52px;height:40px;background:'+col+';filter:brightness(0.78);border-radius:5px;box-shadow:2px 2px 6px rgba(0,0,0,0.5);';
    const cwin = document.createElement('div');
    cwin.style.cssText = 'position:absolute;left:4px;top:5px;width:32px;height:18px;background:#b8edf5;border-radius:2px;opacity:0.9;';
    const hlight = document.createElement('div');
    hlight.style.cssText = 'position:absolute;left:1px;top:26px;width:9px;height:7px;background:#fff8a0;border-radius:1px;';
    cab.appendChild(cwin); cab.appendChild(hlight);
    el.appendChild(trailer); el.appendChild(cab);
    ['6px','68px','88px','right:6px'].forEach((pos,i) => {
      const w = document.createElement('div');
      const lr = pos.startsWith('right') ? 'right:6px' : 'left:'+pos;
      w.style.cssText = 'position:absolute;'+lr+';top:38px;width:18px;height:18px;background:#111;border-radius:50%;box-shadow:inset 0 0 0 4px #555;';
      el.appendChild(w);
    });

  } else { // moto
    const hCol = rndCol();
    el.style.cssText = 'width:52px;height:36px;position:relative;';
    const frame = document.createElement('div');
    frame.style.cssText = 'position:absolute;left:6px;top:14px;width:40px;height:5px;background:#777;border-radius:2px;';
    const rider = document.createElement('div');
    rider.style.cssText = 'position:absolute;left:14px;top:4px;width:20px;height:14px;background:#333;border-radius:4px;';
    const helmet = document.createElement('div');
    helmet.style.cssText = 'position:absolute;left:16px;top:0px;width:14px;height:14px;background:'+hCol+';border-radius:50%;';
    const hl = document.createElement('div');
    hl.style.cssText = 'position:absolute;left:1px;top:17px;width:7px;height:5px;background:#fff8a0;border-radius:50%;';
    const tl = document.createElement('div');
    tl.style.cssText = 'position:absolute;right:1px;top:17px;width:5px;height:5px;background:#ff4444;border-radius:50%;';
    el.appendChild(frame); el.appendChild(rider); el.appendChild(helmet);
    el.appendChild(hl); el.appendChild(tl);
    ['left:0','right:0'].forEach(pos => {
      const w = document.createElement('div');
      w.style.cssText = 'position:absolute;'+pos+';top:20px;width:18px;height:18px;background:#111;border-radius:50%;box-shadow:inset 0 0 0 4px #555;';
      el.appendChild(w);
    });
  }
  return el;
}

/* ── Spawn a vehicle ── */
function pickType(){
  const r=Math.random();
  return r<0.55?'car':r<0.78?'truck':'moto';
}

function doSpawn(lane, startX){
  const type = pickType();
  const def  = VDEFS[type];
  if (startX===undefined) startX = window.innerWidth + def.w + 10;
  const speed = def.speedMin + Math.random()*(def.speedMax-def.speedMin);
  const el = makeVehicleEl(type);
  el.style.left = startX + 'px';
  el.style.top  = (laneCenterY(lane) - def.h/2) + 'px';
  gc.appendChild(el);
  vehicles.push({el, lane, speed, x:startX, w:def.w, h:def.h});
}

function spawnVehicle(){
  const lanes=[0,1,2,3].sort(()=>Math.random()-0.5);
  for (const lane of lanes){
    const crowded = vehicles.some(v => v.lane===lane && v.x > window.innerWidth - 200);
    if (!crowded){ doSpawn(lane); return; }
  }
}

// Pre-seed: mix of on-screen and off-screen so traffic is immediate
function initTraffic(){
  const W = window.innerWidth;
  // negative / small x = already on screen or entering; large x = off-screen queue
  [
    {lane:0, x:W*0.15}, {lane:2, x:W*0.40},
    {lane:1, x:W*0.65}, {lane:3, x:W*0.85},
    {lane:0, x:W*1.10}, {lane:2, x:W*1.35},
    {lane:1, x:W*1.70}, {lane:3, x:W*2.00},
  ].forEach(({lane,x}) => doSpawn(lane, x));
}

/* ── Update vehicles ── */
function updateVehicles(){
  for (let i=vehicles.length-1;i>=0;i--){
    const v=vehicles[i];
    v.x -= v.speed;
    v.el.style.left = v.x+'px';
    if (v.x+v.w < 0){ v.el.remove(); vehicles.splice(i,1); }
  }
}

/* ── Collision ── */
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function checkCollision(){
  if (isDead||isInvincible) return;
  const fL=frogX-14, fT=frogY-10, fW=28, fH=24;
  for (const v of vehicles){
    const vL=v.x+5, vT=laneCenterY(v.lane)-v.h/2+5, vW=v.w-10, vH=v.h-14;
    if (rectsOverlap(fL,fT,fW,fH,vL,vT,vW,vH)){ hitFrog(); return; }
  }
}

/* ── Splat ── */
function showSplat(x,y){
  const s=document.createElement('div'); s.className='splat';
  s.style.left=x+'px'; s.style.top=y+'px';
  [{w:54,h:42,ox:0,oy:0},{w:20,h:16,ox:-32,oy:-10},{w:16,h:14,ox:34,oy:-14},
   {w:18,h:14,ox:8,oy:-30},{w:14,h:18,ox:-18,oy:26},{w:12,h:10,ox:28,oy:22},
   {w:10,h:8,ox:-10,oy:32},{w:8,h:6,ox:40,oy:8}
  ].forEach(({w,h,ox,oy})=>{
    const b=document.createElement('div'); b.className='splat-blob';
    b.style.width=w+'px'; b.style.height=h+'px';
    b.style.marginLeft=(ox-w/2)+'px'; b.style.marginTop=(oy-h/2)+'px';
    s.appendChild(b);
  });
  const x2=document.createElement('div'); x2.className='splat-x'; x2.textContent='✕';
  s.appendChild(x2); gc.appendChild(s); return s;
}

/* ── Lives ── */
function updateLivesHUD(){
  for (let i=0;i<3;i++)
    document.getElementById('life-'+i).classList.toggle('lost',i>=lives);
}

function hitFrog(){
  isDead=true; frogEl.style.display='none';
  const splat=showSplat(frogX,frogY);
  lives--; updateLivesHUD();
  setTimeout(()=>{
    splat.remove();
    if (lives<=0) { gameOverEl.style.display='flex'; }
    else { respawnFrog(); }
  },1400);
}

function respawnFrog(){
  isDead=false; isInvincible=true;
  frogEl.style.display=''; frogEl.classList.add('invincible');
  frogStart();
  setTimeout(()=>{ isInvincible=false; frogEl.classList.remove('invincible'); },2000);
}

/* ── Restart ── */
function restartGame(){
  vehicles.forEach(v=>v.el.remove()); vehicles=[];
  lives=3; isDead=false; isInvincible=false;
  updateLivesHUD();
  gameOverEl.style.display='none';
  frogEl.style.display=''; frogEl.classList.remove('invincible');
  frogStart(); initTraffic();
}

/* ── Frog ── */
function frogStart(){
  const {top,bottom,w}=roadBounds();
  frogX=w/2; frogY=(top+bottom)/2;
  frogEl.style.left=frogX+'px'; frogEl.style.top=frogY+'px';
  frogEl.style.transform='translate(-50%,-50%)';
  frogDir=1;
}

/* ── Input ── */
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

/* ── Spawn scheduler ── */
function scheduleSpawn(){
  if (gameOverEl.style.display!=='flex') spawnVehicle();
  setTimeout(scheduleSpawn, 700+Math.random()*1200);
}

/* ── Game loop ── */
const FSPEED=4;
let isMoving=false, hopTimer=null;

function triggerHop(){
  frogEl.classList.remove('hopping');
  void frogEl.offsetWidth;
  frogEl.classList.add('hopping');
  clearTimeout(hopTimer);
  hopTimer=setTimeout(()=>frogEl.classList.remove('hopping'),200);
}

frogStart();
updateLivesHUD();
initTraffic();
setTimeout(scheduleSpawn, 1500);

function gameLoop(){
  if (gameOverEl.style.display!=='flex'){
    if (!isDead){
      const {top,bottom,w}=roadBounds();
      let dx=0,dy=0;
      if(keys['ArrowLeft'])  dx-=FSPEED;
      if(keys['ArrowRight']) dx+=FSPEED;
      if(keys['ArrowUp'])    dy-=FSPEED;
      if(keys['ArrowDown'])  dy+=FSPEED;
      if(dx!==0||dy!==0){
        frogX=Math.min(w-26,  Math.max(26,       frogX+dx));
        frogY=Math.min(bottom-22,Math.max(top+22,frogY+dy));
        if(dx>0) frogDir=1; else if(dx<0) frogDir=-1;
        frogEl.style.left=frogX+'px';
        frogEl.style.top=frogY+'px';
        frogEl.style.transform='translate(-50%,-50%) scaleX('+frogDir+')';
        if(!isMoving){triggerHop();isMoving=true;}
      } else { isMoving=false; }
    }
    updateVehicles();
    checkCollision();
  }
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
