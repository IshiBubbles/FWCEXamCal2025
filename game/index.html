<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highway Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sky ── */
    #sky {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 20%;
      background: linear-gradient(to bottom, #050d18, #0d2540, #1a4a7a);
    }

    /* ── Top verge (grass) ── */
    #verge-top {
      position: absolute;
      top: 20%; left: 0;
      width: 100%; height: 8%;
      background: #2e5022;
    }

    /* ── Road (4 lanes) ── */
    #road {
      position: absolute;
      top: 28%; left: 0;
      width: 100%; height: 56%;
      background: #1e1e1e;
    }

    /* solid yellow edge top */
    #road::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 7px;
      background: #e8c840;
    }

    /* solid yellow edge bottom */
    #road::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 7px;
      background: #e8c840;
    }

    /* ── Bottom verge (grass) ── */
    #verge-bottom {
      position: absolute;
      top: 84%; left: 0;
      width: 100%; height: 16%;
      background: #2e5022;
    }

    /* ── Lane dividers ── */
    /* Each .lane-divider is positioned inside #road at 25%, 50%, 75% */
    .lane-divider {
      position: absolute;
      left: 0;
      /* double-wide so animation can loop seamlessly */
      width: 200%;
      height: 8px;
      display: flex;
      animation: scroll-road 1.4s linear infinite;
    }

    /* Centre divider is solid white (highway median style) */
    .lane-divider.solid .lane-dash {
      width: 100%;
      height: 8px;
      background: #ffffff;
    }

    /* Dashed white lane lines */
    .lane-divider.dashed .lane-dash {
      width: 100px;
      height: 8px;
      background: #ffffff;
      margin-right: 80px;
      flex-shrink: 0;
      border-radius: 3px;
    }

    @keyframes scroll-road {
      from { transform: translateX(0); }
      to   { transform: translateX(-180px); }
    }

    /* ── Trees on verges ── */
    .tree-row {
      position: absolute;
      left: 0;
      /* double wide to allow seamless loop */
      width: 200%;
      display: flex;
      align-items: flex-end;
      gap: 120px;
      animation: scroll-scenery 4s linear infinite;
    }

    @keyframes scroll-scenery {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    #trees-top {
      /* sits just above the road, anchored to bottom of top verge */
      bottom: 72%; /* = 100% - 28% road top */
    }

    #trees-bottom {
      top: 84.5%;
    }

    .tree {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tree-top {
      width: 0; height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 52px solid #2a6628;
    }

    .tree-mid {
      width: 0; height: 0;
      border-left: 30px solid transparent;
      border-right: 30px solid transparent;
      border-bottom: 42px solid #337730;
      margin-top: -20px;
    }

    .tree-trunk {
      width: 12px; height: 20px;
      background: #6b4226;
    }

    /* ── Road surface texture (subtle) ── */
    #road-texture {
      position: absolute;
      top: 28%; left: 0;
      width: 200%; height: 56%;
      background-image: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 3px,
        rgba(255,255,255,0.015) 3px,
        rgba(255,255,255,0.015) 4px
      );
      animation: scroll-texture 0.08s linear infinite;
      pointer-events: none;
    }

    @keyframes scroll-texture {
      from { transform: translateX(0); }
      to   { transform: translateX(-4px); }
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 16px; left: 20px;
      color: #e0e0e0;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 0 8px #000;
      z-index: 20;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="sky"></div>
    <div id="verge-top"></div>

    <!-- Road surface texture overlay -->
    <div id="road-texture"></div>

    <!-- Road with lane markings injected by JS -->
    <div id="road"></div>

    <div id="verge-bottom"></div>

    <!-- Tree rows -->
    <div class="tree-row" id="trees-top"></div>
    <div class="tree-row" id="trees-bottom"></div>

    <div id="hud">&#9679; HIGHWAY 1 &nbsp;|&nbsp; 70 mph</div>
  </div>

  <script>
    const road = document.getElementById('road');

    // 4 lanes = 3 dividers at 25%, 50%, 75% of road height
    // Centre divider (50%) = solid double-white median
    // Outer dividers (25%, 75%) = dashed white lane lines
    const dividers = [
      { pct: 25, type: 'dashed' },
      { pct: 50, type: 'solid'  },  // highway centre median
      { pct: 75, type: 'dashed' },
    ];

    dividers.forEach(({ pct, type }) => {
      const wrapper = document.createElement('div');
      wrapper.className = `lane-divider ${type}`;
      wrapper.style.top = `calc(${pct}% - 4px)`;

      if (type === 'dashed') {
        // fill double-width with dashes
        for (let i = 0; i < 28; i++) {
          const dash = document.createElement('div');
          dash.className = 'lane-dash';
          wrapper.appendChild(dash);
        }
      } else {
        // solid: one wide bar (double width handled by parent)
        const bar = document.createElement('div');
        bar.className = 'lane-dash';
        wrapper.appendChild(bar);

        // second solid line just below for double-line median
        const wrapper2 = document.createElement('div');
        wrapper2.className = `lane-divider ${type}`;
        wrapper2.style.top = `calc(${pct}% + 6px)`;
        const bar2 = document.createElement('div');
        bar2.className = 'lane-dash';
        wrapper2.appendChild(bar2);
        road.appendChild(wrapper2);
      }

      road.appendChild(wrapper);
    });

    // Trees — build enough to fill double-width seamlessly
    function buildTrees(rowId, count, scale) {
      const row = document.getElementById(rowId);
      for (let i = 0; i < count; i++) {
        const tree = document.createElement('div');
        tree.className = 'tree';
        const s = scale * (0.7 + Math.random() * 0.6);
        tree.style.transform = `scale(${s})`;
        tree.style.transformOrigin = 'bottom center';
        tree.innerHTML = `
          <div class="tree-top"></div>
          <div class="tree-mid"></div>
          <div class="tree-trunk"></div>
        `;
        row.appendChild(tree);
      }
    }

    buildTrees('trees-top', 22, 1);
    buildTrees('trees-bottom', 22, 1.2);
  </script>
</body>
</html>
