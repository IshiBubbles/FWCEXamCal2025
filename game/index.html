<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highway Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sky ── */
    #sky {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 20%;
      background: linear-gradient(to bottom, #050d18, #0d2540, #1a4a7a);
    }

    /* ── Top verge (grass) ── */
    #verge-top {
      position: absolute;
      top: 20%; left: 0;
      width: 100%; height: 8%;
      background: #2e5022;
    }

    /* ── Road (4 lanes) ── */
    #road {
      position: absolute;
      top: 28%; left: 0;
      width: 100%; height: 56%;
      background: #1e1e1e;
    }

    /* solid yellow edge top */
    #road::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 7px;
      background: #e8c840;
    }

    /* solid yellow edge bottom */
    #road::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 7px;
      background: #e8c840;
    }

    /* ── Bottom verge (grass) ── */
    #verge-bottom {
      position: absolute;
      top: 84%; left: 0;
      width: 100%; height: 16%;
      background: #2e5022;
    }

    /* ── Lane dividers ── */
    .lane-divider {
      position: absolute;
      left: 0;
      width: 200%;
      height: 8px;
      display: flex;
      animation: scroll-road 1.4s linear infinite;
    }

    .lane-divider.solid .lane-dash {
      width: 100%;
      height: 8px;
      background: #ffffff;
    }

    .lane-divider.dashed .lane-dash {
      width: 100px;
      height: 8px;
      background: #ffffff;
      margin-right: 80px;
      flex-shrink: 0;
      border-radius: 3px;
    }

    @keyframes scroll-road {
      from { transform: translateX(0); }
      to   { transform: translateX(-180px); }
    }

    /* ── Trees on verges ── */
    .tree-row {
      position: absolute;
      left: 0;
      width: 200%;
      display: flex;
      align-items: flex-end;
      gap: 120px;
      animation: scroll-scenery 4s linear infinite;
    }

    @keyframes scroll-scenery {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    #trees-top {
      bottom: 72%;
    }

    #trees-bottom {
      top: 84.5%;
    }

    .tree {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tree-top {
      width: 0; height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 52px solid #2a6628;
    }

    .tree-mid {
      width: 0; height: 0;
      border-left: 30px solid transparent;
      border-right: 30px solid transparent;
      border-bottom: 42px solid #337730;
      margin-top: -20px;
    }

    .tree-trunk {
      width: 12px; height: 20px;
      background: #6b4226;
    }

    /* ── Road surface texture ── */
    #road-texture {
      position: absolute;
      top: 28%; left: 0;
      width: 200%; height: 56%;
      background-image: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 3px,
        rgba(255,255,255,0.015) 3px,
        rgba(255,255,255,0.015) 4px
      );
      animation: scroll-texture 0.08s linear infinite;
      pointer-events: none;
    }

    @keyframes scroll-texture {
      from { transform: translateX(0); }
      to   { transform: translateX(-4px); }
    }

    /* ── Frog character ── */
    #frog {
      position: absolute;
      width: 52px;
      height: 44px;
      z-index: 30;
      /* centred on its own anchor point */
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
    }

    /* frog body */
    #frog .body {
      position: absolute;
      width: 38px; height: 30px;
      background: #3cb043;
      border-radius: 50% 50% 45% 45%;
      top: 10px; left: 7px;
      box-shadow: inset 0 -4px 6px rgba(0,0,0,0.3);
    }

    /* belly */
    #frog .belly {
      position: absolute;
      width: 24px; height: 18px;
      background: #a8e063;
      border-radius: 50%;
      top: 16px; left: 14px;
    }

    /* eyes */
    #frog .eye {
      position: absolute;
      width: 14px; height: 14px;
      background: #3cb043;
      border-radius: 50%;
      top: 2px;
    }
    #frog .eye.left  { left: 6px; }
    #frog .eye.right { right: 6px; }

    #frog .eye::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      background: #111;
      border-radius: 50%;
      top: 3px; left: 3px;
      box-shadow: 2px 1px 0 1px #fff;
    }

    /* front legs */
    #frog .leg-fl {
      position: absolute;
      width: 10px; height: 16px;
      background: #3cb043;
      border-radius: 0 0 5px 5px;
      top: 26px; left: 0px;
      transform: rotate(-20deg);
    }
    #frog .leg-fr {
      position: absolute;
      width: 10px; height: 16px;
      background: #3cb043;
      border-radius: 0 0 5px 5px;
      top: 26px; right: 0px;
      transform: rotate(20deg);
    }

    /* back legs */
    #frog .leg-bl {
      position: absolute;
      width: 14px; height: 12px;
      background: #3cb043;
      border-radius: 0 0 8px 8px;
      top: 36px; left: 2px;
      transform: rotate(-30deg);
    }
    #frog .leg-br {
      position: absolute;
      width: 14px; height: 12px;
      background: #3cb043;
      border-radius: 0 0 8px 8px;
      top: 36px; right: 2px;
      transform: rotate(30deg);
    }

    /* hop animation */
    @keyframes hop {
      0%   { transform: translate(-50%, -50%) scale(1,   1);   }
      30%  { transform: translate(-50%, -50%) scale(0.85, 1.2); }
      60%  { transform: translate(-50%, -50%) scale(1.1, 0.9); }
      100% { transform: translate(-50%, -50%) scale(1,   1);   }
    }
    #frog.hopping {
      animation: hop 0.18s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="sky"></div>
    <div id="verge-top"></div>
    <div id="road-texture"></div>
    <div id="road"></div>
    <div id="verge-bottom"></div>

    <div class="tree-row" id="trees-top"></div>
    <div class="tree-row" id="trees-bottom"></div>

    <!-- Frog -->
    <div id="frog">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="body">
        <div class="belly"></div>
      </div>
      <div class="leg-fl"></div>
      <div class="leg-fr"></div>
      <div class="leg-bl"></div>
      <div class="leg-br"></div>
    </div>
  </div>

  <script>
    /* ── Lane markings ── */
    const road = document.getElementById('road');

    const dividers = [
      { pct: 25, type: 'dashed' },
      { pct: 50, type: 'solid'  },
      { pct: 75, type: 'dashed' },
    ];

    dividers.forEach(({ pct, type }) => {
      const wrapper = document.createElement('div');
      wrapper.className = `lane-divider ${type}`;
      wrapper.style.top = `calc(${pct}% - 4px)`;

      if (type === 'dashed') {
        for (let i = 0; i < 28; i++) {
          const dash = document.createElement('div');
          dash.className = 'lane-dash';
          wrapper.appendChild(dash);
        }
      } else {
        const bar = document.createElement('div');
        bar.className = 'lane-dash';
        wrapper.appendChild(bar);

        const wrapper2 = document.createElement('div');
        wrapper2.className = `lane-divider ${type}`;
        wrapper2.style.top = `calc(${pct}% + 6px)`;
        const bar2 = document.createElement('div');
        bar2.className = 'lane-dash';
        wrapper2.appendChild(bar2);
        road.appendChild(wrapper2);
      }

      road.appendChild(wrapper);
    });

    /* ── Trees ── */
    function buildTrees(rowId, count, scale) {
      const row = document.getElementById(rowId);
      for (let i = 0; i < count; i++) {
        const tree = document.createElement('div');
        tree.className = 'tree';
        const s = scale * (0.7 + Math.random() * 0.6);
        tree.style.transform = `scale(${s})`;
        tree.style.transformOrigin = 'bottom center';
        tree.innerHTML = `
          <div class="tree-top"></div>
          <div class="tree-mid"></div>
          <div class="tree-trunk"></div>
        `;
        row.appendChild(tree);
      }
    }
    buildTrees('trees-top', 22, 1);
    buildTrees('trees-bottom', 22, 1.2);

    /* ── Frog controller ── */
    const frog = document.getElementById('frog');
    const SPEED = 4;          // px per frame
    const FROG_W = 52;
    const FROG_H = 44;

    // Road bounds: top 28vh + 7px edge, bottom 84vh - 7px edge
    function roadBounds() {
      const h = window.innerHeight;
      const w = window.innerWidth;
      return {
        minX: FROG_W / 2,
        maxX: w - FROG_W / 2,
        minY: h * 0.28 + 7  + FROG_H / 2,
        maxY: h * 0.84 - 7  - FROG_H / 2,
      };
    }

    // Start in the centre of the road, horizontally centred
    let fx = window.innerWidth  / 2;
    let fy = window.innerHeight * 0.28 + (window.innerHeight * 0.56) / 2;

    frog.style.left = fx + 'px';
    frog.style.top  = fy + 'px';

    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      // prevent page scroll
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
    });
    document.addEventListener('keyup',   e => { keys[e.key] = false; });

    let hopTimer = null;
    function triggerHop() {
      frog.classList.remove('hopping');
      void frog.offsetWidth; // reflow to restart animation
      frog.classList.add('hopping');
      clearTimeout(hopTimer);
      hopTimer = setTimeout(() => frog.classList.remove('hopping'), 200);
    }

    let moving = false;

    function gameLoop() {
      const b = roadBounds();
      let dx = 0, dy = 0;

      if (keys['ArrowLeft'])  dx -= SPEED;
      if (keys['ArrowRight']) dx += SPEED;
      if (keys['ArrowUp'])    dy -= SPEED;
      if (keys['ArrowDown'])  dy += SPEED;

      if (dx !== 0 || dy !== 0) {
        fx = Math.min(b.maxX, Math.max(b.minX, fx + dx));
        fy = Math.min(b.maxY, Math.max(b.minY, fy + dy));
        frog.style.left = fx + 'px';
        frog.style.top  = fy + 'px';

        if (!moving) { triggerHop(); moving = true; }
      } else {
        moving = false;
      }

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
